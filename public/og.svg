<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glow" cx="85%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ea580c" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent-rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#0e0d0b"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- logo -->
  <text x="80" y="95" font-family="Georgia, 'Fraunces', serif" font-size="32" font-style="italic" fill="#f5f0e8" font-weight="500">jmlabs<tspan fill="#ea580c" font-style="normal">.</tspan></text>

  <!-- hero tag -->
  <g transform="translate(80, 160)">
    <rect x="0" y="0" width="340" height="36" rx="18" fill="#1c1a14" stroke="#2a2720"/>
    <circle cx="22" cy="18" r="4" fill="#4ade80"/>
    <circle cx="22" cy="18" r="7" fill="#4ade80" fill-opacity="0.3"/>
    <text x="36" y="24" font-family="ui-monospace, 'Geist Mono', monospace" font-size="12" fill="#a89c8c" letter-spacing="1.2">AVAILABLE · AI PRODUCT TEAMS</text>
  </g>

  <!-- main title -->
  <text x="80" y="340" font-family="Georgia, 'Fraunces', serif" font-size="150" fill="#f5f0e8" font-weight="300" letter-spacing="-5">José</text>
  <text x="80" y="475" font-family="Georgia, 'Fraunces', serif" font-size="150" font-style="italic" fill="#ea580c" font-weight="400" letter-spacing="-5">Miranda<tspan fill="#f5f0e8" font-style="normal">.</tspan></text>

  <!-- accent rule -->
  <rect x="80" y="510" width="80" height="3" rx="1.5" fill="url(#accent-rule)"/>

  <!-- tagline -->
  <text x="80" y="560" font-family="Georgia, 'Fraunces', serif" font-size="32" fill="#f5f0e8" font-weight="300">Full-stack developer building products with</text>
  <text x="80" y="560" font-family="Georgia, 'Fraunces', serif" font-size="32" fill="#f5f0e8" font-weight="300">
    <tspan>Full-stack developer building products with </tspan>
    <tspan fill="#ea580c" font-style="italic">AI</tspan>
    <tspan>.</tspan>
  </text>

  <!-- footer meta -->
  <text x="80" y="595" font-family="ui-monospace, 'Geist Mono', monospace" font-size="14" fill="#756b5e" letter-spacing="1">jmlabs.app · Next.js · Gemini · Cloudflare</text>
</svg>
